# Configuration for ur16e_push_stick — pi0.5 non-prehensile push task.
#
# Robot: UR16e with a stick "gripper" (pipe-nipple, no grasping).
# Task:  push the red cube from PUSH_OBJECT_INIT_POS to GOAL_MARKER_POS using pi0.5.
# Policy: pi0.5 served by openpi (WebSocket) — start server before world.py.

n_steps: 5000

# Robot base position and initial joint config (same stand as reach_stand)
robot_init_pos: [0.208, 0.0, 2.075]
robot_init_joints: [0.549, -2.2557, 1.0872, 0.8265, 1.5802, 0.5275]

# End-effector link (tool0 is merged into wrist_3_link with merge_fixed_joints=True)
ee_link_name: "wrist_3_link"

# Stand URDF path
stand_urdf: "/home/paolo/Documents/isaaclabmpc/assets/fixed_assets/stand/stand.urdf"

# ── pi0.5 policy server ───────────────────────────────────────────────────────
# Checkpoint is cached at ~/.cache/openpi/checkpoints/pi05_base after first download.
# Available checkpoints: pi05_base, pi05_droid, pi05_libero
pi05:
  host: "localhost"
  port: 8000

  # Language instruction sent to the model each inference call.
  language_instruction: "push the red block forward to the green goal marker"

  # How many predicted actions to execute before re-querying the server.
  # pi0.5 predicts a horizon of 10 actions; executing 5 balances responsiveness
  # vs. inference overhead. Set to 1 for maximum reactivity.
  action_execute: 5

  # Scale factor applied to the raw delta-joint-position actions output by pi0.5
  # before converting to joint velocity commands.  The DROID normalization stats
  # are trained on Franka data; tune this empirically (start with 0.5–1.0).
  action_scale: 0.5

# ── Isaac Lab physics ─────────────────────────────────────────────────────────
isaaclab:
  dt: 0.02
  env_spacing: 3.0

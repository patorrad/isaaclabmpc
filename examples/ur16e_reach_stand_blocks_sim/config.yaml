# Distance threshold (metres) for declaring a step complete
step_threshold: 0.04

# # End-effector body name in the Isaac Lab articulation.
# # With merge_fixed_joints=True in UrdfFileCfg, tool0/flange are merged
# # into wrist_3_link, so we reference wrist_3_link here.
# ee_link_name: "wrist_3_link"

